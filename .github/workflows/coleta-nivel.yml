name: Coleta de nível dos rios

on:
  schedule:
    - cron: '*/30 * * * *' # a cada 30 min (o Actions pode atrasar; tolerado)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Coletar níveis (AlertaBlu + Defesa Civil SC)
        env:
          NODE_EXTRA_CA_CERTS: scripts/ca-blumenau.pem # gov não manda o intermediário Sectigo
        run: node scripts/coleta-nivel.mjs

      - name: Publicar na branch "dados" (commit único, sem poluir o histórico)
        run: |
          git config user.name "capivara-bot"
          git config user.email "capivara-bot@users.noreply.github.com"
          git checkout --orphan dados-nova
          git rm -rf --quiet . || true
          git add -f niveis.json
          git commit -q -m "níveis $(date -u +%Y-%m-%dT%H:%M)Z"
          git push -f origin dados-nova:dados
